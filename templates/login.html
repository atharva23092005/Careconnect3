{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon-wrap"><i class="fa-solid fa-heart-pulse"></i></div>
            <h2>Welcome Back</h2>
            <p>Sign in to access your care dashboard</p>
        </div>

        {% if error %}
        <div class="alert alert-danger"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </form>

        <p class="auth-footer-text">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        <p class="auth-hint"><i class="fa-solid fa-circle-info"></i> Demo login: <strong>admin / admin123</strong></p>
    </div>
</div>
{% endblock %}
