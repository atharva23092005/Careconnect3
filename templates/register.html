{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon-wrap"><i class="fa-solid fa-user-plus"></i></div>
            <h2>Create Account</h2>
            <p>Start monitoring daily routines with care</p>
        </div>

        {% if error %}
        <div class="alert alert-danger"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="username">Full Name / Username</label>
                <input type="text" id="username" name="username" placeholder="e.g. Shrutkirti" required autocomplete="username" />
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password" />
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required />
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
                <i class="fa-solid fa-heart"></i> Create Account
            </button>
        </form>

        <p class="auth-footer-text">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
    </div>
</div>
{% endblock %}
